<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <form action="/server">
    <div id="mainbox">
        <h3>Signup Form</h3><br>
        <div class="option-login">
            <a id="login-btn" href="login.html">Login</a>
            <a id="signup-btn" href="signup.html">Signup</a><br>
        </div>

        <input type="email" placeholder="Email Address" class="input-area" id="signup-email" ><br>
        <input type="password" placeholder="Password" class="input-area" id="Password" ><br>
        <input type="password" placeholder="Confirm password" class="input-area" id="Confirm-password" ><br>

        <button type="submit" id="submit-btn">Signup</button>
    </div>
    </form>
</body>
